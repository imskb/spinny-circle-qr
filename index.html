<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spinny Circle</title>
  <meta name="robots" content="noindex" />

  <!-- Warm up the store connections in parallel (shaves the redirect hop). -->
  <link rel="dns-prefetch" href="//apps.apple.com" />
  <link rel="dns-prefetch" href="//play.google.com" />
  <link rel="preconnect" href="https://apps.apple.com" crossorigin />
  <link rel="preconnect" href="https://play.google.com" crossorigin />

  <!-- Redirect runs FIRST, during head parse, before any rendering. Fastest possible. -->
  <script>
    (function () {
      var IOS = "https://apps.apple.com/in/app/spinny-circle/id6755675833";
      var PLAY = "https://play.google.com/store/apps/details?id=com.spinny.circle.prod";
      var ua = navigator.userAgent || navigator.vendor || "";
      var uadPlatform = ((navigator.userAgentData || {}).platform || "").toLowerCase();
      var touch = navigator.maxTouchPoints || 0;

      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (/Macintosh/.test(ua) && touch > 1);                 // iPadOS 13+ (reports as Mac)
      var isAndroid = /android/i.test(ua) || uadPlatform === "android"; // Client Hints catches tablets in desktop mode
      var isKnownDesktop = /Windows|Win64|Macintosh|CrOS/i.test(ua) ||
                  ["windows", "macos", "chromeos", "chrome os"].indexOf(uadPlatform) !== -1;
      // Android tablet requesting the desktop site loses the "Android"/"Mobile" tokens:
      // a touch device that is neither iOS nor a known desktop OS is almost certainly an Android tablet.
      var likelyAndroidTablet = !isIOS && !isAndroid && !isKnownDesktop && touch > 0;

      var target = isIOS ? IOS : ((isAndroid || likelyAndroidTablet) ? PLAY : null);
      if (target) location.replace(target); // fires immediately, before body/CSS
    })();
  </script>

  <style>
    :root { --purple:#3c1a5e; --purple-2:#2e1249; --red:#f5333f; --red-2:#ff5a63; }
    html,body { height:100%; margin:0; background:var(--purple);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .wrap { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; padding:24px; text-align:center; }

    /* --- Spinny Circle logo (CSS recreation) --- */
    .logo { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .spinny { display:flex; align-items:center; gap:9px; }
    .s-badge {
      width:34px; height:34px; border-radius:10px;
      background:linear-gradient(145deg,var(--red-2),var(--red));
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:800; font-size:22px; line-height:1;
      box-shadow:0 3px 10px rgba(245,51,63,.35);
    }
    .spinny-word { color:#fff; font-weight:700; font-size:24px; letter-spacing:.2px; }
    .circle-word { color:#fff; font-weight:800; font-size:52px; line-height:1; letter-spacing:1px; }

    p { margin:0; color:#c9bce0; font-size:14px; }
    p a { color:#fff; text-decoration:none; border-bottom:1px solid rgba(255,255,255,.35); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <div class="spinny">
        <span class="s-badge">S</span>
        <span class="spinny-word">Spinny</span>
      </div>
      <div class="circle-word">CIRCLE</div>
    </div>
    <p>Open on your phone to download &middot;
      <a href="https://apps.apple.com/in/app/spinny-circle/id6755675833">App&nbsp;Store</a> &middot;
      <a href="https://play.google.com/store/apps/details?id=com.spinny.circle.prod">Google&nbsp;Play</a>
    </p>
  </div>
</body>
</html>
