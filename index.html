<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spinny Circle</title>
  <meta name="robots" content="noindex" />

  <!-- Warm up the store connections in parallel (shaves the redirect hop). -->
  <link rel="dns-prefetch" href="//apps.apple.com" />
  <link rel="dns-prefetch" href="//play.google.com" />
  <link rel="preconnect" href="https://apps.apple.com" crossorigin />
  <link rel="preconnect" href="https://play.google.com" crossorigin />

  <!-- Redirect runs FIRST, during head parse, before any rendering. Fastest possible. -->
  <script>
    (function () {
      var IOS = "https://apps.apple.com/in/app/spinny-circle/id6755675833";
      var PLAY = "https://play.google.com/store/apps/details?id=com.spinny.circle.prod";
      var ua = navigator.userAgent || navigator.vendor || "";
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1); // iPadOS 13+
      var target = isAndroid ? PLAY : (isIOS ? IOS : null);
      if (target) location.replace(target); // fires immediately, before body/CSS
    })();
  </script>

  <style>
    html,body { height:100%; margin:0; background:#0f1115; color:#f4f5f7;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
    .wrap { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; text-align:center; }
    .logo { width:60px; height:60px; border-radius:15px; background:#ff4d4f; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; color:#fff; }
    h1 { font-size:20px; margin:0; }
    p { margin:0; color:#9aa0aa; font-size:14px; }
    p a { color:#c9ced6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">SC</div>
    <h1>Spinny Circle</h1>
    <p>Open on your phone to download &middot;
      <a href="https://apps.apple.com/in/app/spinny-circle/id6755675833">App&nbsp;Store</a> &middot;
      <a href="https://play.google.com/store/apps/details?id=com.spinny.circle.prod">Google&nbsp;Play</a>
    </p>
  </div>
</body>
</html>
