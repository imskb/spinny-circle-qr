<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get Spinny Circle</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg:#0f1115; --card:#171a21; --fg:#f4f5f7; --muted:#9aa0aa; --accent:#ff4d4f; }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; }
    body {
      background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .card {
      width:100%; max-width:380px; background:var(--card); border-radius:20px;
      padding:32px 28px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.4);
    }
    .logo {
      width:64px; height:64px; margin:0 auto 18px; border-radius:16px;
      background:var(--accent); display:flex; align-items:center; justify-content:center;
      font-size:30px; font-weight:800; color:#fff;
    }
    h1 { font-size:22px; margin:0 0 6px; }
    p.sub { color:var(--muted); font-size:15px; margin:0 0 24px; }
    .btns { display:flex; flex-direction:column; gap:12px; }
    a.btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      text-decoration:none; padding:14px 18px; border-radius:12px; font-size:16px; font-weight:600;
      background:#fff; color:#111; transition:transform .08s ease;
    }
    a.btn:active { transform:scale(.98); }
    a.btn .ico { font-size:20px; }
    .hint { margin-top:18px; font-size:13px; color:var(--muted); min-height:18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SC</div>
    <h1>Spinny Circle</h1>
    <p class="sub" id="sub">Opening your app store&hellip;</p>
    <div class="btns">
      <a class="btn" id="ios" href="https://apps.apple.com/in/app/spinny-circle/id6755675833">
        <span class="ico">&#63743;</span> Download on the App Store
      </a>
      <a class="btn" id="android" href="https://play.google.com/store/apps/details?id=com.spinny.circle.prod">
        <span class="ico">&#9654;</span> Get it on Google Play
      </a>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <script>
    (function () {
      var IOS_URL = "https://apps.apple.com/in/app/spinny-circle/id6755675833";
      var PLAY_URL = "https://play.google.com/store/apps/details?id=com.spinny.circle.prod";

      var ua = navigator.userAgent || navigator.vendor || window.opera || "";
      var isAndroid = /android/i.test(ua);
      // iOS incl. iPadOS 13+ (which reports as Mac but is touch-capable)
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);

      var sub = document.getElementById("sub");
      var hint = document.getElementById("hint");
      var iosBtn = document.getElementById("ios");
      var androidBtn = document.getElementById("android");

      function go(url) {
        // Replace so the redirector isn't left in history / back button works cleanly.
        window.location.replace(url);
      }

      if (isAndroid) {
        androidBtn.style.order = "-1";
        hint.textContent = "If it doesn't open automatically, tap the button above.";
        go(PLAY_URL);
      } else if (isIOS) {
        iosBtn.style.order = "-1";
        hint.textContent = "If it doesn't open automatically, tap the button above.";
        go(IOS_URL);
      } else {
        // Desktop / unknown: don't auto-redirect, just show both.
        sub.textContent = "Choose your platform to download the app.";
      }
    })();
  </script>

  <noscript>
    <div style="text-align:center;margin-top:16px;color:#9aa0aa;font-size:13px;">
      JavaScript is off. Use the buttons above to download Spinny Circle.
    </div>
  </noscript>
</body>
</html>
